    \ font-size: 10px; }\n  .dateby { width: 45%; }\n  .engtbl td { border: 1px solid #ccc; padding: 4px 6px; width: 50%; vertical-align: top; }\n  .contacts td.contact { border: 1px solid #ccc; padding:\
    \ 4px 6px; width: 50%; vertical-align: top; }\n  .contact .who { font-weight: bold; font-size: 10px; color: #333; }\n  .contact .nm { font-weight: bold; }\n  .contact .ln { font-size: 10px; }\n  .grp\
    \ { margin: 6px 0; }\n  .grplab { font-weight: bold; text-transform: uppercase; font-size: 10px; color: #333; margin-bottom: 2px; }\n  .cb { display: inline-block; margin-right: 12px; font-size: 10px;\
    \ white-space: nowrap; }\n  .box { display: inline-block; width: 10px; height: 10px; border: 1px solid #333; margin-right: 4px; vertical-align: middle; }\n  .signoff td { border: 1px solid #ccc; padding:\
    \ 8px 6px; text-align: center; font-size: 10px; font-weight: bold; width: 33.33%; }\n  .notes { border: 1px solid #999; min-height: 90px; padding: 6px; white-space: pre-wrap; }\n</style>\n</head>\n\
    <body>\n  <div class=\"sheet\">\n    <div class=\"clienthead\">CLIENT: {{client.name}}</div>\n    <div class=\"title\">FILE ROUTING SHEET</div>\n\n    <table class=\"contactlog\">\n      <tr>\n    \
    \    <td class=\"dateby\">Date/By ____________</td>\n        <td class=\"chan\"><span class=\"cb\"><span class=\"box\"></span>PHN</span><span class=\"cb\"><span class=\"box\"></span>VM</span><span class=\"\
    cb\"><span class=\"box\"></span>EM</span><span class=\"cb\"><span class=\"box\"></span>SMS</span></td>\n      </tr>\n      <tr>\n        <td class=\"dateby\">Date/By ____________</td>\n        <td class=\"\
    chan\"><span class=\"cb\"><span class=\"box\"></span>PHN</span><span class=\"cb\"><span class=\"box\"></span>VM</span><span class=\"cb\"><span class=\"box\"></span>EM</span><span class=\"cb\"><span\
    \ class=\"box\"></span>SMS</span></td>\n      </tr>\n      <tr>\n        <td class=\"dateby\">Date/By ____________</td>\n        <td class=\"chan\"><span class=\"cb\"><span class=\"box\"></span>PHN</span><span\
    \ class=\"cb\"><span class=\"box\"></span>VM</span><span class=\"cb\"><span class=\"box\"></span>EM</span><span class=\"cb\"><span class=\"box\"></span>SMS</span></td>\n      </tr>\n      <tr>\n   \
    \     <td class=\"dateby\">Date/By ____________</td>\n        <td class=\"chan\"><span class=\"cb\"><span class=\"box\"></span>PHN</span><span class=\"cb\"><span class=\"box\"></span>VM</span><span\
    \ class=\"cb\"><span class=\"box\"></span>EM</span><span class=\"cb\"><span class=\"box\"></span>SMS</span></td>\n      </tr>\n    </table>\n\n    <div class=\"section\">I. ENGAGEMENT</div>\n    <table\
    \ class=\"engtbl\">\n      <tr>\n        <td><span class=\"lab\">Engagement:</span> {{engagementName}}</td>\n        <td><span class=\"lab\">Period:</span> {{periodLabel}}</td>\n      </tr>\n      <tr>\n\
    \        <td><span class=\"lab\">Owner:</span> {{partnerName}}</td>\n        <td><span class=\"lab\">Manager:</span> {{managerName}}</td>\n      </tr>\n      <tr>\n        <td><span class=\"lab\">Status:</span>\
    \ <strong>{{workflowStateLabel}}</strong></td>\n        <td><span class=\"lab\">Date Project Due:</span> {{dueDate}}</td>\n      </tr>\n      <tr>\n        <td colspan=\"2\"><span class=\"lab\">Assignees:</span>\
    \ {{assignees}}</td>\n      </tr>\n    </table>\n\n    <table class=\"contacts\">\n      <tr>\n        <td class=\"contact\">\n          <div class=\"who\">PRIMARY</div>\n          <div class=\"nm\"\
    >{{primary.name}}</div>\n          <div class=\"ln\">Email: {{primary.email}}</div>\n          <div class=\"ln\">Home: {{primary.home}}</div>\n          <div class=\"ln\">Mobile: {{primary.mobile}}</div>\n\
    \        </td>\n        <td class=\"contact\">\n          <div class=\"who\">SECONDARY</div>\n          <div class=\"nm\">{{secondary.name}}</div>\n          <div class=\"ln\">Email: {{secondary.email}}</div>\n\
    \          <div class=\"ln\">Home: {{secondary.home}}</div>\n          <div class=\"ln\">Mobile: {{secondary.mobile}}</div>\n        </td>\n      </tr>\n    </table>\n    <div class=\"row\"><span class=\"\
    lab\">Address:</span> <span class=\"cval\">{{client.address}}</span></div>\n\n    <div class=\"grp\">\n      <div class=\"grplab\">DELIVER PROJECT VIA</div>\n      <span class=\"cb\"><span class=\"\
    box\"></span>Pickup Paper</span><span class=\"cb\"><span class=\"box\"></span>Email</span><span class=\"cb\"><span class=\"box\"></span>SafeSend</span><span class=\"cb\"><span class=\"box\"></span>Priority\
    \ Mail</span><span class=\"cb\"><span class=\"box\"></span>Meeting</span><span class=\"cb\"><span class=\"box\"></span>Portal</span><span class=\"cb\"><span class=\"box\"></span>E-Sign</span>\n    </div>\n\
    \    <div class=\"grp\">\n      <div class=\"grplab\">PROJECT DOCUMENTS STORED IN</div>\n      <span class=\"cb\"><span class=\"box\"></span>Paper Folder</span><span class=\"cb\"><span class=\"box\"\
    ></span>Email</span><span class=\"cb\"><span class=\"box\"></span>Scanned to WP Folder</span><span class=\"cb\"><span class=\"box\"></span>Inbox Folder</span><span class=\"cb\"><span class=\"box\"></span>Portal</span>\n\
    \    </div>\n    <div class=\"grp\">\n      <div class=\"grplab\">CONTACT WHEN READY</div>\n      <span class=\"cb\"><span class=\"box\"></span>Phone</span><span class=\"cb\"><span class=\"box\"></span>VM</span><span\
    \ class=\"cb\"><span class=\"box\"></span>Email</span><span class=\"cb\"><span class=\"box\"></span>SMS</span>\n    </div>\n\n    <table class=\"signoff\">\n      <tr>\n        <td>PARTNER REVIEW<br/>___/___/____</td>\n\
    \        <td>STAFF PREPARER<br/>___/___/____</td>\n        <td>ASSEMBLED/SENT BY<br/>___/___/____</td>\n      </tr>\n      <tr>\n        <td>PICKUP ___/___/___</td>\n        <td>SIGNATURE</td>\n   \
    \     <td>CONFIRMATION</td>\n      </tr>\n    </table>\n\n    <div class=\"section\">III. SPECIAL INSTRUCTIONS / HANDLING / NOTES</div>\n    <div class=\"notes\">{{note}}</div>\n  </div>\n</body>\n\
    </html>"
  css: '* { box-sizing: border-box; }

    body { font-family: Arial, Helvetica, sans-serif; color: #111; font-size: 11px; margin: 0; }

    .sheet { padding: 4px 2px; page-break-after: always; }

    .sheet:last-child { page-break-after: auto; }

    .clienthead { text-align: left; font-size: 16px; font-weight: bold; margin-bottom: 2px; }

    .title { text-align: center; font-size: 16px; font-weight: bold; letter-spacing: 1px; border-bottom: 2px solid #111; padding-bottom: 4px; margin-bottom: 6px; }

    .section { background: #111; color: #fff; font-weight: bold; padding: 2px 6px; margin: 8px 0 4px; font-size: 11px; }

    .row { margin: 3px 0; }

    .lab { font-weight: bold; text-transform: uppercase; font-size: 10px; color: #333; }

    .cval { border-bottom: 1px solid #999; display: inline-block; min-width: 60%; }

    table { width: 100%; border-collapse: collapse; }

    .contactlog td { border: 1px solid #ccc; padding: 3px 6px; font-size: 10px; }

    .dateby { width: 45%; }

    .engtbl td { border: 1px solid #ccc; padding: 4px 6px; width: 50%; vertical-align: top; }

    .contacts td.contact { border: 1px solid #ccc; padding: 4px 6px; width: 50%; vertical-align: top; }

    .contact .who { font-weight: bold; font-size: 10px; color: #333; }

    .contact .nm { font-weight: bold; }

    .contact .ln { font-size: 10px; }

    .grp { margin: 6px 0; }

    .grplab { font-weight: bold; text-transform: uppercase; font-size: 10px; color: #333; margin-bottom: 2px; }

    .cb { display: inline-block; margin-right: 12px; font-size: 10px; white-space: nowrap; }

    .box { display: inline-block; width: 10px; height: 10px; border: 1px solid #333; margin-right: 4px; vertical-align: middle; }

    .signoff td { border: 1px solid #ccc; padding: 8px 6px; text-align: center; font-size: 10px; font-weight: bold; width: 33.33%; }

    .notes { border: 1px solid #999; min-height: 90px; padding: 6px; white-space: pre-wrap; }'
