    card_brand: Visa
    card_last4: '4242'
    status: SUCCEEDED
    receipt_number: 2845-1042
    charge_id: ch_3PabcXYZ12345
    customer_email: jane@example.com
    line_items:
    - name: Widget
      amount: '9.98'
    - name: Gadget Pro
      amount: '14.50'
    receipt_url: https://pay.stripe.com/receipts/acct_123/ch_3PabcXYZ
